# render.yaml — Render Blueprint
services:
  - type: web
    name: energy-learning-hub
    runtime: docker
    plan: starter           # $7/mo — free tier may timeout on large PDFs
    region: singapore
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: PDF_DIR
        value: ./data
      - key: CHROMA_DIR
        value: ./chroma_db
      - key: PORT
        value: "10000"
    disk:
      name: energy-hub-data
      mountPath: /app/chroma_db
      sizeGB: 1
